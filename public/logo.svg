<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E8430A"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A88A"/>
      <stop offset="100%" style="stop-color:#0090B0"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->

  <rect x="0" y="0" width="520" height="160" rx="18" fill="#ffffff"/>
  <!-- Subtle border -->
  <rect x="0" y="0" width="520" height="160" rx="18" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Map pin body -->

  <path d="M62 22 C44 22 30 36 30 54 C30 74 62 105 62 105 C62 105 94 74 94 54 C94 36 80 22 62 22 Z" fill="url(#pinGrad)" filter="url(#softglow)"/>
  <circle cx="62" cy="52" r="14" fill="#fff" opacity="0.95"/>

  <!-- Tiny RC car inside pin -->

  <rect x="54" y="48" width="18" height="9" rx="2.5" fill="#E8430A"/>
  <rect x="57" y="44" width="10" height="6" rx="2" fill="#FF6B35"/>
  <rect x="58" y="44.5" width="8" height="4.5" rx="1.5" fill="#e0e0e0" opacity="0.9"/>
  <circle cx="57" cy="58.5" r="3" fill="#555"/>
  <circle cx="57" cy="58.5" r="1.5" fill="#999"/>
  <circle cx="69" cy="58.5" r="3" fill="#555"/>
  <circle cx="69" cy="58.5" r="1.5" fill="#999"/>

  <!-- Speed lines -->

  <line x1="96" y1="48" x2="108" y2="46" stroke="#00A88A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="54" x2="112" y2="54" stroke="#00A88A" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="60" x2="108" y2="62" stroke="#00A88A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Wordmark — dark text for light bg -->

<text x="126" y="80" font-family="'Arial Black', 'Impact', sans-serif" font-size="52" font-weight="900" fill="url(#tealGrad)" letter-spacing="-1">RC</text>
<text x="196" y="80" font-family="'Arial Black', 'Impact', sans-serif" font-size="52" font-weight="900" fill="#1a2d40" letter-spacing="-1">SPOT</text>
<text x="127" y="108" font-family="'Arial Rounded MT Bold', 'Arial Black', sans-serif" font-size="22" font-weight="700" fill="#FF6B35" letter-spacing="7">FINDER</text>
<rect x="126" y="88" width="258" height="3" rx="1.5" fill="url(#tealGrad)" opacity="0.4"/>

  <!-- Vehicle icons -->

  <g transform="translate(406, 42)" opacity="0.85">
    <rect x="0" y="6" width="20" height="9" rx="2" fill="#FF6B35"/>
    <rect x="3" y="2" width="11" height="6" rx="1.5" fill="#FF8C5A"/>
    <circle cx="4" cy="16" r="3" fill="#1a2d40"/>
    <circle cx="16" cy="16" r="3" fill="#1a2d40"/>
  </g>
  <g transform="translate(432, 42)" opacity="0.85">
    <path d="M0 12 L4 4 L16 4 L20 12 Z" fill="#FF6B35"/>
    <path d="M-2 12 L22 12 L18 17 L2 17 Z" fill="#FF8C5A"/>
    <line x1="10" y1="1" x2="10" y2="4" stroke="#00A88A" stroke-width="1.5"/>
  </g>
  <g transform="translate(458, 42)" opacity="0.85">
    <path d="M10 2 L14 10 L10 9 L6 10 Z" fill="#FF6B35"/>
    <path d="M4 7 L16 7 L14 10 L6 10 Z" fill="#FF8C5A"/>
    <path d="M7 10 L5 14 L10 12 L15 14 L13 10 Z" fill="#FF6B35"/>
  </g>
  <g transform="translate(484, 40)" opacity="0.85">
    <rect x="7" y="7" width="8" height="8" rx="1.5" fill="#FF6B35"/>
    <circle cx="4" cy="4" r="3" fill="none" stroke="#00A88A" stroke-width="1.5"/>
    <circle cx="18" cy="4" r="3" fill="none" stroke="#00A88A" stroke-width="1.5"/>
    <circle cx="4" cy="18" r="3" fill="none" stroke="#00A88A" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="3" fill="none" stroke="#00A88A" stroke-width="1.5"/>
    <line x1="6" y1="6" x2="8" y2="8" stroke="#aaa" stroke-width="1"/>
    <line x1="16" y1="6" x2="14" y2="8" stroke="#aaa" stroke-width="1"/>
    <line x1="6" y1="16" x2="8" y2="14" stroke="#aaa" stroke-width="1"/>
    <line x1="16" y1="16" x2="14" y2="14" stroke="#aaa" stroke-width="1"/>
  </g>

<text x="408" y="78" font-family="'Arial', sans-serif" font-size="8" fill="#1a2d40" opacity="0.35" letter-spacing="1">CAR · BOAT · PLANE · DRONE</text>
<line x1="398" y1="30" x2="398" y2="130" stroke="#1a2d40" stroke-opacity="0.1" stroke-width="1"/>
<text x="406" y="105" font-family="'Arial', sans-serif" font-size="12" fill="#00A88A" opacity="0.8" letter-spacing="0.5">rcspotfinder.com</text>
</svg>