<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" width="260" height="100">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E8430A"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A88A"/>
      <stop offset="100%" style="stop-color:#0090B0"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Map pin body -->
  <path d="M38 8 C24 8 14 20 14 34 C14 50 38 72 38 72 C38 72 62 50 62 34 C62 20 52 8 38 8 Z" fill="url(#pinGrad)" filter="url(#softglow)"/>
  <circle cx="38" cy="32" r="10" fill="#fff" opacity="0.95"/>

  <!-- Tiny RC car inside pin -->
  <rect x="32" y="29" width="13" height="7" rx="2" fill="#E8430A"/>
  <rect x="34" y="26" width="8" height="4.5" rx="1.5" fill="#FF6B35"/>
  <rect x="35" y="26.5" width="6" height="3.5" rx="1" fill="#e0e0e0" opacity="0.9"/>
  <circle cx="34" cy="37" r="2.2" fill="#555"/>
  <circle cx="34" cy="37" r="1.1" fill="#999"/>
  <circle cx="43" cy="37" r="2.2" fill="#555"/>
  <circle cx="43" cy="37" r="1.1" fill="#999"/>

  <!-- Wordmark -->
  <text x="72" y="48" font-family="'Arial Black', 'Impact', sans-serif" font-size="36" font-weight="900" fill="url(#tealGrad)" letter-spacing="-1">RC</text>
  <text x="122" y="48" font-family="'Arial Black', 'Impact', sans-serif" font-size="36" font-weight="900" fill="#1a2d40" letter-spacing="-1">SPOT</text>
  <text x="73" y="68" font-family="'Arial Rounded MT Bold', 'Arial Black', sans-serif" font-size="15" font-weight="700" fill="#FF6B35" letter-spacing="5">FINDER</text>
  <rect x="72" y="53" width="178" height="2" rx="1" fill="url(#tealGrad)" opacity="0.4"/>
</svg>